name: Build Release Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Dependencies & Fix electron-builder
        run: npm install electron-builder --save-dev

      - name: Build Webpack (React/Main Code)
        run: npm run build

      - name: Package macOS App (ZIP)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --c.mac.target=zip

      - name: Package Windows App (ZIP)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --c.win.target=zip

      - name: Upload macOS ZIP Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App
          path: release/build/*.zip
          retention-days: 7

      - name: Upload Windows ZIP Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-App
          path: release/build/*.zip
          retention-days: 7
