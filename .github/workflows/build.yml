name: Build Release Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Needed so the build can publish/update the "latest" GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let one OS failing cancel the other one.
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        # postinstall runs `electron-builder install-app-deps`, which rebuilds
        # native modules (better-sqlite3) for the bundled Electron version.
        run: npm install

      - name: Build Webpack (React / main code)
        run: npm run build

      - name: Package macOS App (ZIP, Intel + Apple Silicon)
        if: matrix.os == 'macos-latest'
        # No Apple signing certificate in CI, so don't try to auto-discover one.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --arm64 --c.mac.target=zip --publish never

      - name: Package Windows App (ZIP, portable)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --x64 --c.win.target=zip --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os == 'macos-latest' && 'macOS-App' || 'Windows-App' }}
          path: release/build/*.zip
          retention-days: 14

  release:
    name: Publish "latest" release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish / update rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automated build of the latest push to `main` (commit ${{ github.sha }}).

            Downloads:
            - **Windows**: the `*-win.zip` file (unzip and run the .exe — no install needed)
            - **macOS (Apple Silicon / M-series)**: the `*-arm64-mac.zip` file
            - **macOS (Intel)**: the `*-mac.zip` file

            Note: the apps are not code-signed. On macOS, right-click the app and
            choose "Open" the first time (or run `xattr -cr "IOM Regatta Manager.app"`).
            On Windows, click "More info" → "Run anyway" if SmartScreen warns.
          files: dist/**/*.zip
