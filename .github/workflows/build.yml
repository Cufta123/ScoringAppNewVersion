name: Build Release Apps

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab if needed

jobs:
  build:
    # This matrix creates one run with two parallel jobs (one for Mac, one for Windows)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install electron-builder
        run: npm install --no-save electron-builder@latest

      - name: Install app native deps
        run: npx electron-builder install-app-deps

      - name: Build Webpack (React/Main Code)
        run: npm run build

      - name: Package macOS App (ZIP)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --c.mac.target=zip

      - name: Package Windows App (ZIP)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --c.win.target=zip

      - name: Upload macOS ZIP Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App
          path: release/build/*.zip
          retention-days: 7

      - name: Upload Windows ZIP Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-App
          path: release/build/*.zip
          retention-days: 7
