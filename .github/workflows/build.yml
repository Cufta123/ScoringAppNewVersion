name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: |
          set -eux
          npm ci --ignore-scripts

      - name: Build (webpack)
        run: npm run build

      - name: Package (electron-forge make)
        run: npm run make

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ScoringApp-macOS
          path: out/make/zip/darwin/**/*.zip
          retention-days: 30

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ScoringApp-Windows
          path: out/make/squirrel.windows/**/*.exe
          retention-days: 30
