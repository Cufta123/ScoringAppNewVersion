name: Build Release Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Needed so the build can publish/update the "latest" GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let one OS failing cancel the other one.
      fail-fast: false
      matrix:
        # Pin Windows to 2022: the windows-latest image ships Visual Studio 18
        # (2026), which the bundled node-gyp can't detect ("unknown version
        # undefined"), breaking the better-sqlite3 native rebuild.
        os: [macos-latest, windows-2022]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        # postinstall runs `electron-builder install-app-deps`, which rebuilds
        # native modules (better-sqlite3) for the bundled Electron version.
        run: npm install

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Build Webpack (React / main code)
        run: npm run build

      - name: Package macOS App (ZIP, Intel + Apple Silicon)
        if: matrix.os == 'macos-latest'
        # No Apple signing certificate in CI, so don't try to auto-discover one.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --arm64 --c.mac.target=zip --publish never

      - name: Package Windows App (ZIP, portable)
        if: matrix.os == 'windows-2022'
        run: npx electron-builder --win --x64 --c.win.target=zip --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os == 'macos-latest' && 'macOS-App' || 'Windows-App' }}
          path: release/build/*.zip
          retention-days: 14

  smoke:
    name: GUI smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        # postinstall rebuilds better-sqlite3 against the bundled Electron.
        run: npm install

      - name: Build Webpack (React / main code)
        run: npm run build

      - name: Install Electron GUI system libraries + Xvfb
        # The smoke tests launch the real Electron binary, which needs a display
        # and the same shared libs as Chromium. playwright install-deps pulls the
        # correct packages for the runner's Ubuntu version; Xvfb provides the
        # virtual display.
        run: |
          sudo apt-get update
          npx playwright install-deps chromium
          sudo apt-get install -y xvfb

      - name: Run GUI smoke tests (Xvfb)
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  release:
    name: Publish "latest" release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish / update rolling "latest" release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automated build of the latest push to `main` (commit ${{ github.sha }}).

            Downloads:
            - **Windows**: the `*-win.zip` file (unzip and run the .exe — no install needed)
            - **macOS (Apple Silicon / M-series)**: the `*-arm64-mac.zip` file
            - **macOS (Intel)**: the `*-mac.zip` file

            Note: the apps are not code-signed. On macOS, right-click the app and
            choose "Open" the first time (or run `xattr -cr "IOM Regatta Manager.app"`).
            On Windows, click "More info" → "Run anyway" if SmartScreen warns.
          files: dist/**/*.zip
